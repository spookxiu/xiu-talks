<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.card {
    width: 375px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-radius: 12px;
    padding: 40px 30px;
    position: relative;
    overflow: hidden;
}
.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: #e94560;
}
.title {
    color: #ffffff;
    font-size: 24px;
    font-weight: bold;
    line-height: 1.4;
    margin-bottom: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.date {
    color: #888888;
    font-size: 12px;
    margin-bottom: 20px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.divider {
    height: 1px;
    background: rgba(255,255,255,0.1);
    margin: 20px 0;
}
.content {
    color: #cccccc;
    font-size: 15px;
    line-height: 1.8;
    margin-bottom: 20px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.quote-box {
    background: rgba(233, 69, 96, 0.08);
    border: 1px solid rgba(233, 69, 96, 0.3);
    border-radius: 8px;
    padding: 20px;
    margin-top: 20px;
}
.quote {
    color: #ffffff;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 10px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.highlight {
    color: #e94560;
    font-size: 18px;
    font-weight: bold;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.author {
    color: #666666;
    font-size: 12px;
    text-align: right;
    margin-top: 15px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
</style>
</head>
<body>
<div class="card">
    <div class="title">关于张雪峰，我其实<br>没什么感觉</div>
    <div class="date">2026.03.25</div>
    <div class="divider"></div>
    <div class="content">
        刷到过几次他的直播，印象最深的就是典型的吵吵吧火的东北人形象。<br><br>
        我报大学志愿的时候是2001年，几乎没什么渠道获取信息。上午发的志愿填报单，下午在学校我自己就填好了。<br><br>
        大学时候也从来没想过考研，天天玩游戏混日子，快毕业时铁了心要去上海闯荡。结果到上海三个月没找到游戏开发的工作，最后还是对日外包拯救了我。笑哭。<br><br>
        所以其实我对他没什么感觉。
    </div>
    <div class="quote-box">
        <div class="quote">"填报志愿不是终点，考上了理想的大学和专业也不是。"</div>
        <div class="highlight">你今后的每一天才是。</div>
        <div class="author">—— 天宇</div>
    </div>
</div>
</body>
</html>
